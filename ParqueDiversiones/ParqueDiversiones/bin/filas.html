<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Filas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Gestión</h2>

        <div class="row">

            <!--Montaña Rusa-->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <img src="../img/montanarusa.jpg">
                    <div class="card-body text-center">
                        <h5>Montaña Rusa</h5>
                        <p id="estado1" class="text-danger">Alta</p>

                        <p>Personas: <span id="fila1">45</span></p>

                        <button onclick="sumar(1)" class="btn btn-success btn-sm">+1</button>
                        <button onclick="restar(1)" class="btn btn-danger btn-sm">-1</button>
                        <button onclick="vaciar(1)" class="btn btn-warning btn-sm">Vaciar</button>
                    </div>
                </div>
            </div>

            <!--La Torre-->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <img src="../img/torre.jpg">
                    <div class="card-body text-center">
                        <h5>La Torre</h5>

                        <p>Personas: <span id="fila2">20</span></p>
                        <p id="estado2" class="text-warning">Media</p>

                        <button onclick="sumar(2)" class="btn btn-success btn-sm">+1</button>
                        <button onclick="restar(2)" class="btn btn-danger btn-sm">-1</button>
                        <button onclick="vaciar(2)" class="btn btn-warning btn-sm">Vaciar</button>
                    </div>
                </div>
            </div>

            <!--Carritos Chocones-->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <img src="../img/carritoschocones.jpg">
                    <div class="card-body text-center">
                        <h5>Carritos Chocones</h5>

                        <p>Personas: <span id="fila3">10</span></p>
                        <p id="estado3" class="text-success">Baja</p>

                        <button onclick="sumar(3)" class="btn btn-success btn-sm">+1</button>
                        <button onclick="restar(3)" class="btn btn-danger btn-sm">-1</button>
                        <button onclick="vaciar(3)" class="btn btn-warning btn-sm">Vaciar</button>
                    </div>
                </div>
            </div>

        </div>

        <!--Sillas Voladoras-->
        <div class="col-md-4 mb-4">
            <div class="card shadow">
                <img src="../img/sillasvoladoras.jpg">
                <div class="card-body text-center">
                    <h5>Sillas Voladoras</h5>

                    <p>Personas: <span id="fila3">10</span></p>
                    <p id="estado4" class="text-success">Baja</p>


                    <button onclick="sumar(3)" class="btn btn-success btn-sm">+1</button>
                    <button onclick="restar(3)" class="btn btn-danger btn-sm">-1</button>
                    <button onclick="vaciar(3)" class="btn btn-warning btn-sm">Vaciar</button>
                </div>
            </div>
        </div>

    </div>

    <!--Volver-->
    <div class="text-center mt-4">
        <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
    </div>
    </div>

    <script>
        function sumar(id) {
            let el = document.getElementById("fila" + id);
            el.innerText = parseInt(el.innerText) + 1;
            actualizarEstado(id);
        }

        function restar(id) {
            let el = document.getElementById("fila" + id);
            let valor = parseInt(el.innerText);
            if (valor > 0) {
                el.innerText = valor - 1;
                actualizarEstado(id);
            }
        }

        function vaciar(id) {
            document.getElementById("fila" + id).innerText = 0;
            actualizarEstado(id);
        }

        function actualizarEstado(id) {
            let valor = parseInt(document.getElementById("fila" + id).innerText);
            let estado = document.getElementById("estado" + id);

            if (valor < 20) {
                estado.innerText = "Baja";
                estado.className = "text-success";
            } else if (valor < 50) {
                estado.innerText = "Media";
                estado.className = "text-warning";
            } else {
                estado.innerText = "Alta";
                estado.className = "text-danger";
            }
        }
    </script>

</body>

</html>
