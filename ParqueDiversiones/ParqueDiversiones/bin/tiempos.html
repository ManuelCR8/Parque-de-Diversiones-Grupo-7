<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tiempos de espera - Parque de Diversiones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}
</style>
</head>

<body>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Tiempos de espera</h2>

        <div class="row">

            <!--Montaña Rusa-->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <img src="../img/montanarusa.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h5 class="card-title">Montaña Rusa</h5>
                        <p class="card-text">Personas en fila: 45</p>
                        <p class="card-text">Tiempo: 30 min</p>
                    </div>
                </div>
            </div>

            <!--La Torre-->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <img src="../img/torre.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h5 class="card-title">La Torre</h5>
                        <p class="card-text">Personas en fila: 15</p>
                        <p class="card-text">Tiempo: 10 min</p>
                    </div>
                </div>
            </div>

            <!--Carritos Chocones-->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <img src="../img/carritoschocones.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h5 class="card-title">Carritos Chocones</h5>
                        <p class="card-text">Personas en fila: 25</p>
                        <p class="card-text">Tiempo: 20 min</p>
                    </div>
                </div>
            </div>

            <!--Sillas Voladoras-->
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <img src="../img/sillasvoladoras.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h5 class="card-title">Sillas Voladoras</h5>
                        <p class="card-text">Personas en fila: 20</p>
                        <p class="card-text">Tiempo: 10 min</p>
                    </div>
                </div>
            </div>
            
    <!--Volver-->
            <div class="text-center mt-4">
    <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
</div>
</body>

</html>
