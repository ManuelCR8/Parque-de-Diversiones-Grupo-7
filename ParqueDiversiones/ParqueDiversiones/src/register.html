<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Parque de Diversiones</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Parque de Diversiones</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">

                <div class="card-header text-center">
                    <h4>Registro de Usuario</h4>
                </div>

                <div class="card-body">
                    <form onsubmit="return registrar()">

                        <div class="mb-3">
                            <label>Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Correo</label>
                            <input type="email" id="correo" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Confirmar contraseña</label>
                            <input type="password" id="confirmar" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Tipo de usuario</label>
                            <select id="rol" class="form-control">
                                <option value="user">Usuario</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-success">Registrarse</button>
                        </div>

                    </form>
                </div>

                <div class="card-footer text-center">
                    <a href="login.html">Ya tengo cuenta</a>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
function registrar() {
    var nombre = document.getElementById("nombre").value;
    var correo = document.getElementById("correo").value;
    var password = document.getElementById("password").value;
    var confirmar = document.getElementById("confirmar").value;
    var rol = document.getElementById("rol").value;

    if (password != confirmar) {
        alert("Las contraseñas no coinciden");
        return false;
    }

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("correo", correo);
    localStorage.setItem("password", password);
    localStorage.setItem("rol", rol);

    alert("Registro exitoso");
    window.location.href = "login.html";

    return false;
}
</script>

</body>
</html>
